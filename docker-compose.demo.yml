services:
  mongodb:
    image: mongo:5
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-12345}
    volumes:
      - mongodbdata:/data/db
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: "none"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.demo
    env_file:
      - .env
    command: gunicorn app:app --bind 0.0.0.0:9876 --workers=8 --log-level=info --timeout 300 --access-logfile '-'
    mem_limit: 8g
    restart: unless-stopped
    user: 1000:1000
    expose:
      - 9876
    volumes:
      - ./:/opt/autograph:ro
    depends_on:
      - mongodb
    networks:
      - internal
      - traefik
    environment:
      - PYTHONUNBUFFERED=1
      - DEMO_MODE=1
      - HOME=/tmp
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik}"
      # HTTP -> HTTPS redirect (both domains).
      - "traefik.http.routers.autoleak-http.rule=Host(`${BASEDOMAIN}`) || Host(`${CROSSORIGINDOMAIN}`)"
      - "traefik.http.routers.autoleak-http.entrypoints=web"
      - "traefik.http.routers.autoleak-http.middlewares=autoleak-redirect"
      - "traefik.http.middlewares.autoleak-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.autoleak-redirect.redirectscheme.permanent=true"
      # HTTPS: main site and the cross-origin domain both resolve to the same backend.
      - "traefik.http.routers.autoleak.rule=Host(`${BASEDOMAIN}`) || Host(`${CROSSORIGINDOMAIN}`)"
      - "traefik.http.routers.autoleak.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.autoleak.tls=true"
      - "traefik.http.routers.autoleak.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      # One cert covering both hostnames (the cross-origin host as a SAN).
      - "traefik.http.routers.autoleak.tls.domains[0].main=${BASEDOMAIN}"
      - "traefik.http.routers.autoleak.tls.domains[0].sans=${CROSSORIGINDOMAIN}"
      - "traefik.http.services.autoleak.loadbalancer.server.port=9876"

  # mongo-express:
