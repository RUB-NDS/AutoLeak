  #     ME_CONFIG_MONGODB_AUTH_PASSWORD: ${MONGO_PASSWORD:-12345}
  #   networks:
  #     - internal
  #   depends_on:
  #     - mongodb

volumes:
  mongodbdata:

networks:
  internal:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}
